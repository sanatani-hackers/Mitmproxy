name: Build mitmproxy-rs for Termux

on: 
  workflow_dispatch:

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download exact PyPI source
        run: |
          pip download --no-binary :all: --no-deps mitmproxy-rs==0.12.9
          tar -xzf mitmproxy_rs-0.12.9.tar.gz
          
      - name: Build Termux Wheel via Maturin
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-linux-android
          working-directory: mitmproxy_rs-0.12.9
          args: --release --out ../dist -i python3.13
          
      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-mitmproxy-rs-wheel
          path: dist/*.whl
